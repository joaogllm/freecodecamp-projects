<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workshop Calculator</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        padding: 20px;
      }

      .container {
        background-color: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        max-width: 600px;
        width: 100%;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 15px;
      }

      p {
        font-size: 1.1rem;
        margin-bottom: 10px;
        line-height: 1.6;
      }

      .highlight {
        margin-top: 20px;
        display: inline-block;
        background-color: #ffffff;
        color: #1e3c72;
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: bold;
        font-size: 1rem;
      }

      .footer {
        margin-top: 25px;
        font-size: 0.95rem;
        opacity: 0.9;
      }

      @media (max-width: 600px) {
        h1 {
          font-size: 2rem;
        }

        p {
          font-size: 1rem;
        }

        .container {
          padding: 30px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Workshop Calculator</h1>
      <p>This page is linked to an external JavaScript file.</p>
      <p>The calculator functions run automatically when the page loads.</p>

      <div class="highlight">Open the Console (F12) to see the results</div>

      <p class="footer">
        JavaScript file: <strong>workshopCalculator.js</strong>
      </p>
    </div>

    <script src="workshopCalculator.js"></script>
  </body>
</html>
